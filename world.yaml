actions:
  read_data:
    type: internal
  send_email:
    type: external
  download_report:
    type: internal
    approval_required: true
  post_webhook:
    type: external

trust:
  user: trusted
  system: trusted
  external: untrusted

capabilities:
  trusted: [internal, external]
  untrusted: [internal]

# Taint rules govern data-level contamination, independent of source trust.
# A trusted source carrying tainted params is still blocked by these rules.
# Rule: tainted data + external action → IMPOSSIBLE (not denied — structurally blocked).
taint_rules:
  - taint: tainted
    action_type: external
    reason: "Tainted data cannot trigger external actions"
